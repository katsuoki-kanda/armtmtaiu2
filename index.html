<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>あいうえお・ハンドゲーム（シンプル表示版）</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; position: fixed; width: 100%; }
        #container { position: relative; width: 100vw; height: 100vh; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
        video { display: none; }
        
        /* スマホ向け開始オーバーレイ */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); color: white; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; text-align: center;
        }
        button {
            padding: 15px 30px; font-size: 20px; font-weight: bold; border-radius: 10px;
            border: none; background: #2ecc71; color: white; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>

<div id="container">
    <video id="input_video" playsinline></video>
    <canvas id="output_canvas"></canvas>
    <div id="overlay">
        <h2>ひらがなハンドゲーム</h2>
        <p>画面に出てくる「あいうえお」の順に<br>手をかざしてタッチしてね！</p>
        <button id="startButton">ゲームをはじめる</button>
    </div>
</div>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('startButton');

    // --- オーディオ設定 (安定化のためAudioContextを再利用) ---
    let audioCtx;
    const synth = window.speechSynthesis;
    
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function playBeep() {
        if (!audioCtx) return;
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(900, audioCtx.currentTime);
        oscillator.start();
        gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.1);
        oscillator.stop(audioCtx.currentTime + 0.1);
    }

    function speak(text) {
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'ja-JP';
        synth.speak(utter);
    }

    // --- ゲーム設定 ---
    const hiraganaGroups = [
        ["あ", "い", "う", "え", "お", "か", "き", "く", "け", "こ"],
        ["さ", "し", "す", "せ", "そ", "た", "ち", "つ", "て", "と"],
        ["な", "に", "ぬ", "ね", "の", "は", "ひ", "ふ", "へ", "ほ"],
        ["ま", "み", "む", "め", "も", "ら", "り", "る", "れ", "ろ"]
    ];
    
    let currentGroupIndex = 0; 
    let score = 0;
    let gameStarted = false;
    let cameraReady = false; 
    let startTime = 0;
    let nextStartEnabledTime = 0;
    const gameDuration = 40;
    
    let circleRadius = 48; 
    let circles = [];
    let targetCount = 1;

    // レスポンシブ対応：画面サイズに合わせて描画サイズを調整
    function updateCanvasSize() {
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;
        circleRadius = Math.min(canvasElement.width, canvasElement.height) * 0.1;
    }
    window.addEventListener('resize', updateCanvasSize);
    updateCanvasSize();

    function generateCircles() {
        circles = [];
        targetCount = 1;
        const currentList = hiraganaGroups[currentGroupIndex];
        const shuffledList = [...currentList].sort(() => Math.random() - 0.5);
        
        const uiBoxWidth = canvasElement.width * 0.3;
        const uiBoxHeight = 60;

        for (let i = 0; i < 10; i++) {
            let x, y, isValid = false, attempts = 0;
            while (!isValid && attempts < 50) {
                const minX = (canvasElement.width / 10) * i + circleRadius;
                const maxX = (canvasElement.width / 10) * (i + 1) - circleRadius;
                x = Math.random() * (maxX - minX) + minX;
                y = Math.random() * (canvasElement.height - circleRadius * 4) + circleRadius * 2;

                const inScoreArea = (x < uiBoxWidth + circleRadius && y < uiBoxHeight + circleRadius);
                const inTimerArea = (x > canvasElement.width - (uiBoxWidth + circleRadius) && y < uiBoxHeight + circleRadius);
                if (!inScoreArea && !inTimerArea) isValid = true;
                attempts++;
            }
            circles.push({ x: x, y: y, value: shuffledList[i], hit: false });
        }
    }

    // 衝突判定： $dist = \sqrt{(hx - cx)^2 + (hy - cy)^2}$
    function checkCollision(hx, hy, cx, cy) {
        const dist = Math.sqrt((hx - cx) ** 2 + (hy - cy) ** 2);
        return dist < circleRadius + 30;
    }

    function onResults(results) {
        cameraReady = true; 
        const currentTime = Date.now();
        const uiWidth = Math.max(160, canvasElement.width * 0.25);
        const uiHeight = 50;

        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.translate(canvasElement.width, 0);
        canvasCtx.scale(-1, 1);
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.restore();

        let timeLeft = 0;
        if (gameStarted) {
            timeLeft = Math.max(0, gameDuration - Math.floor((currentTime - startTime) / 1000));
            if (timeLeft <= 0) {
                gameStarted = false;
                nextStartEnabledTime = currentTime + 3000;
                speak(score + "点です。終了。");
            }
        }

        let hands = [];
        if (results.poseLandmarks) {
            const lIdx = results.poseLandmarks[19];
            const rIdx = results.poseLandmarks[20];
            // 視認性が低い場合は描画しない
            if(lIdx.visibility > 0.5) hands.push({ x: (1 - lIdx.x) * canvasElement.width, y: lIdx.y * canvasElement.height });
            if(rIdx.visibility > 0.5) hands.push({ x: (1 - rIdx.x) * canvasElement.width, y: rIdx.y * canvasElement.height });

            hands.forEach(h => {
                canvasCtx.beginPath();
                canvasCtx.arc(h.x, h.y, 30, 0, 2 * Math.PI);
                canvasCtx.strokeStyle = 'yellow';
                canvasCtx.lineWidth = 5;
                canvasCtx.stroke();
            });

            if (!gameStarted && currentTime > nextStartEnabledTime) {
                if (lIdx.y < 0.3 || rIdx.y < 0.3) {
                    gameStarted = true;
                    score = 0;
                    currentGroupIndex = 0; 
                    startTime = Date.now();
                    generateCircles();
                    speak("スタート");
                }
            }
        }

        if (gameStarted) {
            let allHit = true;
            const currentList = hiraganaGroups[currentGroupIndex];

            circles.forEach(c => {
                if (!c.hit) {
                    allHit = false;
                    // 正解の文字か判定
                    if (c.value === currentList[targetCount - 1]) {
                        hands.forEach(h => {
                            if (checkCollision(h.x, h.y, c.x, c.y)) {
                                c.hit = true;
                                score++;
                                targetCount++;
                                playBeep();
                            }
                        });
                    }
                    
                    // 円の描画（強調表示なし：すべて同じ赤色）
                    canvasCtx.beginPath();
                    canvasCtx.arc(c.x, c.y, circleRadius, 0, 2 * Math.PI);
                    canvasCtx.fillStyle = 'red'; 
                    canvasCtx.fill();
                    
                    canvasCtx.fillStyle = 'white';
                    canvasCtx.font = `bold ${Math.floor(circleRadius)}px Arial`;
                    canvasCtx.textAlign = "center";
                    canvasCtx.textBaseline = "middle";
                    canvasCtx.fillText(c.value, c.x, c.y);
                } else {
                    // ヒット済みの円
                    canvasCtx.beginPath();
                    canvasCtx.arc(c.x, c.y, circleRadius, 0, 2 * Math.PI);
                    canvasCtx.fillStyle = 'green';
                    canvasCtx.fill();
                }
            });

            if (allHit) {
                currentGroupIndex = (currentGroupIndex + 1) % hiraganaGroups.length;
                generateCircles();
            }
        }

        // --- UI（スコア・タイマー） ---
        canvasCtx.fillStyle = "rgba(0, 0, 0, 0.6)";
        canvasCtx.fillRect(10, 10, uiWidth, uiHeight);
        canvasCtx.fillStyle = "lime";
        canvasCtx.font = "bold 30px Arial";
        canvasCtx.textAlign = "center";
        canvasCtx.fillText(`Score: ${score}`, 10 + uiWidth/2, 10 + uiHeight/2);
        
        canvasCtx.fillStyle = "rgba(0, 0, 0, 0.6)";
        canvasCtx.fillRect(canvasElement.width - uiWidth - 10, 10, uiWidth, uiHeight);
        canvasCtx.fillStyle = "white";
        canvasCtx.fillText(`Time: ${timeLeft}`, canvasElement.width - uiWidth/2 - 10, 10 + uiHeight/2);

        if (!gameStarted && cameraReady) {
            if (currentTime < nextStartEnabledTime) {
                const waitSec = Math.ceil((nextStartEnabledTime - currentTime) / 1000);
                canvasCtx.font = "bold 40px Arial";
                canvasCtx.fillStyle = "orange";
                canvasCtx.fillText(`Wait... ${waitSec}`, canvasElement.width / 2, canvasElement.height / 2);
            } else {
                canvasCtx.font = "bold 50px Arial";
                canvasCtx.fillStyle = "red";
                canvasCtx.fillText("片手を挙げてスタート", canvasElement.width / 2, canvasElement.height / 2);
            }
        }
    }

    // --- MediaPipe ポーズ設定 ---
    const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    pose.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => { await pose.send({image: videoElement}); },
        width: 1280, height: 720,
        facingMode: 'user'
    });

    // --- 開始ボタンの処理（スマホの音声・カメラ制限解除） ---
    startBtn.addEventListener('click', () => {
        initAudio(); 
        overlay.style.display = 'none';
        camera.start();
        speak("カメラ起動ちゅう。ひらがな順にタッチしてね");
    });
</script>
</body>
</html>
